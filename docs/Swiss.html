<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Portfölj-Hub – Alt 3: Minimal Swiss</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #f5f4f0;
        --fg: #181815;
        --fg-mid: #6b6b65;
        --fg-soft: #b0afa8;
        --accent: #2563eb;
        --accent-light: #dbeafe;
        --surface: #fff;
        --border: rgba(0, 0, 0, 0.1);
        --col: 60px;
      }
      body {
        font-family: "Space Grotesk", sans-serif;
        background: var(--bg);
        color: var(--fg);
        min-height: 100vh;
      }

      .layout {
        display: grid;
        grid-template-columns: 280px 1fr;
        min-height: 100vh;
      }

      /* SIDEBAR */
      .sidebar {
        background: var(--fg);
        color: #e8e7e3;
        padding: 2.5rem 2rem;
        display: flex;
        flex-direction: column;
        gap: 2.5rem;
        position: sticky;
        top: 0;
        height: 100vh;
        overflow-y: auto;
      }
      .sidebar-logo {
        font-family: "Space Mono", monospace;
        font-size: 13px;
        letter-spacing: 0.12em;
        line-height: 1.6;
      }
      .sidebar-logo strong {
        font-size: 18px;
        font-weight: 700;
        display: block;
        color: #fff;
        margin-bottom: 4px;
        letter-spacing: -0.01em;
      }
      .sidebar-divider {
        height: 1px;
        background: rgba(255, 255, 255, 0.1);
      }
      .sidebar-label {
        font-family: "Space Mono", monospace;
        font-size: 9px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.3);
        margin-bottom: 0.75rem;
      }
      .filter-list {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .filter-item {
        font-size: 13px;
        font-weight: 500;
        padding: 8px 12px;
        border-radius: 6px;
        cursor: pointer;
        color: rgba(255, 255, 255, 0.6);
        transition: all 0.15s;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: transparent;
        border: none;
        text-align: left;
        width: 100%;
      }
      .filter-item:hover {
        background: rgba(255, 255, 255, 0.07);
        color: #fff;
      }
      .filter-item.active {
        background: var(--accent);
        color: #fff;
      }
      .filter-count {
        font-family: "Space Mono", monospace;
        font-size: 10px;
        opacity: 0.6;
      }
      .sidebar-stats {
        margin-top: auto;
      }
      .sidebar-stat {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        padding: 8px 0;
        border-top: 1px solid rgba(255, 255, 255, 0.06);
      }
      .sidebar-stat-label {
        font-size: 11px;
        color: rgba(255, 255, 255, 0.4);
      }
      .sidebar-stat-val {
        font-family: "Space Mono", monospace;
        font-size: 13px;
        color: #fff;
      }

      /* MAIN */
      .main {
        background: var(--bg);
      }
      .topbar {
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 1.25rem 2.5rem;
        display: flex;
        align-items: center;
        gap: 1.5rem;
        position: sticky;
        top: 0;
        z-index: 5;
      }
      .topbar h2 {
        font-size: 14px;
        font-weight: 600;
      }
      .topbar-count {
        font-family: "Space Mono", monospace;
        font-size: 11px;
        color: var(--fg-mid);
      }
      .topbar-search {
        margin-left: auto;
      }
      .topbar-search input {
        font-family: "Space Grotesk", sans-serif;
        font-size: 13px;
        padding: 7px 14px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: var(--bg);
        color: var(--fg);
        width: 220px;
      }
      .view-toggle {
        display: flex;
        border: 1px solid var(--border);
        border-radius: 6px;
        overflow: hidden;
      }
      .view-btn {
        font-size: 12px;
        padding: 6px 12px;
        background: transparent;
        border: none;
        cursor: pointer;
        color: var(--fg-mid);
      }
      .view-btn.active {
        background: var(--fg);
        color: #fff;
      }

      /* CONTENT AREA */
      .content {
        padding: 2rem 2.5rem;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 1rem;
      }
      .card {
        background: var(--surface);
        border-radius: 12px;
        border: 1px solid var(--border);
        padding: 1.5rem;
        display: flex;
        flex-direction: column;
        gap: 14px;
        cursor: pointer;
        transition:
          border-color 0.15s,
          transform 0.15s;
      }
      .card:hover {
        border-color: var(--accent);
        transform: translateY(-2px);
      }
      .card-head {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .avatar-ring {
        width: 46px;
        height: 46px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 15px;
        font-weight: 700;
        flex-shrink: 0;
      }
      .card-info {
        flex: 1;
        min-width: 0;
      }
      .card-name {
        font-size: 15px;
        font-weight: 600;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .card-role {
        font-size: 11px;
        color: var(--fg-mid);
        font-weight: 500;
        margin-top: 2px;
      }
      .avail-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #22c55e;
        flex-shrink: 0;
      }
      .card-bio {
        font-size: 12px;
        color: var(--fg-mid);
        line-height: 1.65;
      }
      .card-skills {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
      }
      .skill-tag {
        font-family: "Space Mono", monospace;
        font-size: 10px;
        padding: 3px 8px;
        border-radius: 5px;
        background: var(--bg);
        color: var(--fg-mid);
        border: 1px solid var(--border);
      }
      .skill-tag.lit {
        background: var(--accent-light);
        color: var(--accent);
        border-color: #93c5fd;
      }
      .card-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
        margin-top: 2px;
      }
      .act-btn {
        font-family: "Space Grotesk", sans-serif;
        font-size: 11px;
        font-weight: 600;
        padding: 7px 10px;
        border-radius: 7px;
        cursor: pointer;
        text-align: center;
        letter-spacing: 0.01em;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--fg-mid);
        transition: all 0.15s;
      }
      .act-btn:hover {
        background: var(--bg);
      }
      .act-btn.primary {
        background: var(--accent);
        color: white;
        border-color: var(--accent);
      }
      .act-btn.primary:hover {
        background: #1d4ed8;
      }

      footer {
        padding: 1.5rem 2.5rem;
        border-top: 1px solid var(--border);
        background: var(--surface);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      footer p {
        font-size: 12px;
        color: var(--fg-soft);
      }
      footer span {
        font-family: "Space Mono", monospace;
        font-size: 11px;
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <div class="sidebar-logo">
          <strong>Portfölj Hub</strong>
          Lexicon · FSD 2025–2026
        </div>

        <div>
          <div class="sidebar-label">Visa alla</div>
          <div
            class="filter-list"
            id="filters"
          >
            <button
              class="filter-item active"
              onclick="filter(this, 'Alla')"
            >
              Alla studenter <span class="filter-count">6</span>
            </button>
            <button
              class="filter-item"
              onclick="filter(this, 'React')"
            >
              React <span class="filter-count">6</span>
            </button>
            <button
              class="filter-item"
              onclick="filter(this, 'TypeScript')"
            >
              TypeScript <span class="filter-count">5</span>
            </button>
            <button
              class="filter-item"
              onclick="filter(this, 'Next.js')"
            >
              Next.js <span class="filter-count">2</span>
            </button>
            <button
              class="filter-item"
              onclick="filter(this, 'Node.js')"
            >
              Node.js <span class="filter-count">3</span>
            </button>
            <button
              class="filter-item"
              onclick="filter(this, 'UX/Design')"
            >
              UX/Design <span class="filter-count">2</span>
            </button>
          </div>
        </div>

        <div class="sidebar-divider"></div>

        <div class="sidebar-stats">
          <div class="sidebar-label">Statistik</div>
          <div class="sidebar-stat">
            <span class="sidebar-stat-label">Studenter totalt</span><span class="sidebar-stat-val">12</span>
          </div>
          <div class="sidebar-stat">
            <span class="sidebar-stat-label">Open to work</span><span class="sidebar-stat-val">12/12</span>
          </div>
          <div class="sidebar-stat">
            <span class="sidebar-stat-label">Teknologier</span><span class="sidebar-stat-val">8+</span>
          </div>
          <div class="sidebar-stat">
            <span class="sidebar-stat-label">Cohort</span><span class="sidebar-stat-val">2026</span>
          </div>
        </div>
      </aside>

      <div class="main">
        <div class="topbar">
          <h2>Studentprofiler</h2>
          <span
            class="topbar-count"
            id="count"
            >6 profiler</span
          >
          <div class="topbar-search">
            <input
              type="text"
              placeholder="Sök namn eller teknik..."
              oninput="search(this.value)"
            />
          </div>
        </div>

        <div class="content">
          <div
            class="grid"
            id="grid"
          ></div>
        </div>

        <footer>
          <p>Klassens Portfölj-Hub · Lexicon Frontend System Development 2025–2026</p>
          <span>Cohort 2026 · Open to Work</span>
        </footer>
      </div>
    </div>

    <script>
      const students = [
        {
          initials: "MK",
          bg: "#f0fdb4",
          fg: "#3d6b04",
          name: "Manu K.",
          role: "Frontend Developer",
          bio: "Bygger Art Oracle med Next.js och Grok AI. Passionerad om modern React-arkitektur.",
          tags: ["React", "Next.js", "TypeScript", "Tailwind"],
        },
        {
          initials: "SL",
          bg: "#d1fae5",
          fg: "#065f46",
          name: "Sara L.",
          role: "Frontend + UX",
          bio: "Kombinerar designtänk med solid kod. CSS-arkitekt och Figma-expert i klassen.",
          tags: ["React", "UX/Design", "Figma", "CSS"],
        },
        {
          initials: "JB",
          bg: "#ede9fe",
          fg: "#4c1d95",
          name: "Jonas B.",
          role: "Fullstack-light",
          bio: "Node-bakgrund som omfamnat React. Driver API-design och backend-integrationer.",
          tags: ["Node.js", "React", "TypeScript", "REST"],
        },
        {
          initials: "EA",
          bg: "#fef3c7",
          fg: "#78350f",
          name: "Elin A.",
          role: "UI Developer",
          bio: "Tillgänglighetsspecialist. Varje komponent lever upp till WCAG 2.1 AA i hennes kod.",
          tags: ["React", "CSS", "UX/Design", "WCAG"],
        },
        {
          initials: "TN",
          bg: "#fce7f3",
          fg: "#831843",
          name: "Tobias N.",
          role: "Animation Lead",
          bio: "GSAP-nörd med öga för rörelse. Micro-interactions och scroll-animationer.",
          tags: ["React", "TypeScript", "GSAP", "Motion"],
        },
        {
          initials: "FO",
          bg: "#dcfce7",
          fg: "#14532d",
          name: "Fatima O.",
          role: "Data + Frontend",
          bio: "Visualiserar komplex data med Recharts och D3. Gör det komplicerade begripligt.",
          tags: ["React", "Node.js", "TypeScript", "D3"],
        },
      ];
      let active = "Alla",
        q = "";

      function filter(el, val) {
        document.querySelectorAll(".filter-item").forEach((f) => f.classList.remove("active"));
        el.classList.add("active");
        active = val;
        render();
      }
      function search(val) {
        q = val.toLowerCase();
        render();
      }
      function render() {
        const list = students.filter((s) => {
          const mf = active === "Alla" || s.tags.includes(active);
          const mq = !q || s.name.toLowerCase().includes(q) || s.tags.some((t) => t.toLowerCase().includes(q));
          return mf && mq;
        });
        document.getElementById("count").textContent = `${list.length} profiler`;
        document.getElementById("grid").innerHTML = list
          .map(
            (s) => `
    <div class="card">
      <div class="card-head">
        <div class="avatar-ring" style="background:${s.bg};color:${s.fg}">${s.initials}</div>
        <div class="card-info">
          <div class="card-name">${s.name}</div>
          <div class="card-role">${s.role}</div>
        </div>
        <div class="avail-dot" title="Open to work"></div>
      </div>
      <div class="card-bio">${s.bio}</div>
      <div class="card-skills">${s.tags.map((t) => `<span class="skill-tag${t === active && active !== "Alla" ? " lit" : ""}">${t}</span>`).join("")}</div>
      <div class="card-actions">
        <button class="act-btn">LinkedIn ↗</button>
        <button class="act-btn primary">Portfolio →</button>
      </div>
    </div>`,
          )
          .join("");
      }
      render();
    </script>
  </body>
</html>
